name: inovaskill-grespan

services:
  postgres:
    image: postgres:16-alpine
    container_name: inovaskill-postgres
    environment:
      POSTGRES_DB: inovaskill_importer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inovaskill_importer"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0

  redis:
    image: redis:7-alpine
    container_name: inovaskill-redis
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.50

volumes:
  postgres_data:
  redis_data:
